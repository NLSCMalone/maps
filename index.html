<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NLSC 我的地圖 - 學校與美食探索</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', 'Microsoft JhengHei', sans-serif; }
        #map { height: calc(100vh - 64px); }
        .custom-popup .leaflet-popup-content-wrapper { border-radius: 12px; padding: 10px; }
        .sidebar-transition { transition: transform 0.3s ease-in-out; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        .layer-btn.active { background-color: #eff6ff; color: #2563eb; font-weight: 600; border: 1px solid #bfdbfe; }
        .overlay-btn.active { background-color: #fff7ed; color: #ea580c; font-weight: 600; border: 1px solid #ffedd5; }
        .overlay-btn.active .dot { background-color: #ea580c; box-shadow: 0 0 8px #ea580c; }
        
        .tab-btn.active { border-bottom: 2px solid #2563eb; color: #2563eb; }
    </style>
</head>
<body class="bg-gray-50 overflow-hidden">

    <header class="h-16 bg-white border-b flex items-center justify-between px-6 shadow-sm z-50 relative">
        <div class="flex items-center space-x-3">
            <div class="bg-blue-600 p-2 rounded-lg">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
            </div>
            <div>
                <h1 class="text-lg font-bold text-gray-800 leading-none">NLSC 我的地圖</h1>
                <p class="text-[10px] text-gray-400 mt-1">學校與美食探索版</p>
            </div>
        </div>
        <div class="flex items-center space-x-2">
            <button onclick="exportData()" class="px-4 py-2 text-sm font-medium text-blue-600 bg-blue-50 hover:bg-blue-100 rounded-lg transition">匯出備份</button>
            <input type="file" id="importFile" class="hidden" onchange="importData(event)">
            <button onclick="document.getElementById('importFile').click()" class="px-4 py-2 text-sm font-medium text-gray-600 bg-gray-100 hover:bg-gray-200 rounded-lg transition">匯入</button>
        </div>
    </header>

    <main class="flex relative">
        <aside id="sidebar" class="w-80 bg-white border-r h-[calc(100vh-64px)] flex flex-col z-40">
            <!-- 分頁切換 -->
            <div class="flex border-b">
                <button onclick="switchTab('manage')" id="tab-manage" class="tab-btn flex-1 py-3 text-sm font-bold text-gray-500 active">地點管理</button>
                <button onclick="switchTab('school')" id="tab-school" class="tab-btn flex-1 py-3 text-sm font-bold text-gray-500">學校探索</button>
            </div>

            <!-- 地點管理內容 -->
            <div id="content-manage" class="flex-1 overflow-y-auto p-4 space-y-4">
                <div class="relative">
                    <input type="text" id="searchInput" placeholder="搜尋地址、地點..." class="w-full pl-10 pr-4 py-2 border rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                    <div class="absolute left-3 top-2.5 text-gray-400">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                    </div>
                    <button onclick="searchLocation()" class="mt-2 w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition font-medium">搜尋地點</button>
                </div>
                <hr class="border-gray-100">
                <div id="poiList" class="space-y-2"></div>
            </div>

            <!-- 學校探索內容 -->
            <div id="content-school" class="hidden flex-1 overflow-y-auto p-4 space-y-4">
                <div class="space-y-3">
                    <label class="text-xs font-bold text-gray-500 uppercase">1. 選擇學校等級</label>
                    <select id="schoolLevel" class="w-full p-2 border rounded-lg text-sm outline-none focus:ring-2 focus:ring-purple-500">
                        <option value="university">大學 (University)</option>
                        <option value="high_school">高中 (High School)</option>
                        <option value="middle_school">國中 (Middle School)</option>
                        <option value="primary_school">國小 (Primary School)</option>
                    </select>
                    
                    <label class="text-xs font-bold text-gray-500 uppercase block mt-2">2. 輸入搜尋地區 (例：台北市)</label>
                    <input type="text" id="schoolArea" placeholder="輸入城市或行政區..." class="w-full p-2 border rounded-lg text-sm outline-none">
                    
                    <button onclick="searchSchools()" id="btn-search-school" class="w-full bg-purple-600 text-white py-2 rounded-lg hover:bg-purple-700 transition font-medium shadow-md shadow-purple-100">搜尋學校</button>
                </div>
                
                <hr class="border-gray-100">
                
                <div id="schoolResults" class="space-y-2">
                    <p class="text-xs text-gray-400 text-center py-4">請輸入地區搜尋學校</p>
                </div>
            </div>
        </aside>

        <div class="flex-1 relative">
            <div id="map" class="z-0"></div>
            
            <!-- 圖層切換 -->
            <div class="absolute top-4 right-4 z-10 flex flex-col space-y-2">
                <div class="bg-white/95 backdrop-blur-md p-2 rounded-2xl shadow-2xl border border-white/50 flex flex-col space-y-1 w-48">
                    <p class="text-[10px] font-black text-gray-400 px-2 mt-1 mb-1 uppercase tracking-widest">地圖底圖</p>
                    <button onclick="toggleBaseLayer('EMAP')" class="layer-btn active flex items-center space-x-2 px-3 py-2 rounded-xl text-sm transition-all" id="btn-EMAP">
                        <span class="w-6 text-center">🗺️</span><span>通用地圖</span>
                    </button>
                    <button onclick="toggleBaseLayer('PHOTO2')" class="layer-btn flex items-center space-x-2 px-3 py-2 rounded-xl text-sm transition-all" id="btn-PHOTO2">
                        <span class="w-6 text-center">🛰️</span><span>衛星影像</span>
                    </button>
                    <div class="h-px bg-gray-100 my-1 mx-2"></div>
                    <p class="text-[10px] font-black text-gray-400 px-2 mt-1 mb-1 uppercase tracking-widest">界線疊加</p>
                    <button onclick="toggleOverlay('COUNTY')" class="overlay-btn flex items-center justify-between px-3 py-2 rounded-xl text-sm transition-all" id="btn-COUNTY">
                        <span>🏙️ 縣市界</span><div class="dot w-2 h-2 rounded-full bg-gray-300"></div>
                    </button>
                    <button onclick="toggleOverlay('VILLAGE')" class="overlay-btn flex items-center justify-between px-3 py-2 rounded-xl text-sm transition-all" id="btn-VILLAGE">
                        <span>🏘️ 村里界</span><div class="dot w-2 h-2 rounded-full bg-gray-300"></div>
                    </button>
                    <button onclick="toggleOverlay('LANDSECT')" class="overlay-btn flex items-center justify-between px-3 py-2 rounded-xl text-sm transition-all" id="btn-LANDSECT">
                        <span>📜 地段圖</span><div class="dot w-2 h-2 rounded-full bg-gray-300"></div>
                    </button>
                </div>
                <div id="zoom-hint" class="hidden bg-orange-600 text-white text-[11px] px-4 py-2 rounded-xl shadow-lg animate-bounce text-center font-bold">
                    請放大地圖以顯示詳細界線
                </div>
            </div>
        </div>
    </main>

    <script>
        let map;
        let markers = [];
        let schoolMarkers = [];
        let foodMarkers = [];
        let poiData = JSON.parse(localStorage.getItem('nlsc_pois') || '[]');
        
        let baseLayers = {};
        let overlays = {};
        let activeOverlays = new Set();

        window.onload = function() {
            map = L.map('map', { center: [25.033, 121.565], zoom: 12, zoomControl: false });
            L.control.zoom({ position: 'bottomright' }).addTo(map);

            const nlscUrl = 'https://wmts.nlsc.gov.tw/wmts/{id}/default/GoogleMapsCompatible/{z}/{y}/{x}';
            baseLayers.EMAP = L.tileLayer(nlscUrl.replace('{id}', 'EMAP'), { maxZoom: 20 });
            baseLayers.PHOTO2 = L.tileLayer(nlscUrl.replace('{id}', 'PHOTO2'), { maxZoom: 20 });
            overlays.COUNTY = L.tileLayer(nlscUrl.replace('{id}', 'COUNTY'), { maxZoom: 20, transparent: true, zIndex: 100 });
            overlays.VILLAGE = L.tileLayer(nlscUrl.replace('{id}', 'VILLAGE'), { maxZoom: 20, transparent: true, zIndex: 120 });
            overlays.LANDSECT = L.tileLayer(nlscUrl.replace('{id}', 'LANDSECT'), { maxZoom: 20, transparent: true, zIndex: 130 });

            baseLayers.EMAP.addTo(map);
            map.on('zoomend', checkZoomLevel);
            map.on('click', e => {
                if (document.getElementById('tab-manage').classList.contains('active')) {
                    addNewPoiPrompt(e.latlng.lat, e.latlng.lng);
                }
            });

            renderPois();
        };

        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            
            document.getElementById('content-manage').classList.toggle('hidden', tab !== 'manage');
            document.getElementById('content-school').classList.toggle('hidden', tab !== 'school');
        }

        // --- 核心地圖控制 ---
        function toggleBaseLayer(key) {
            Object.keys(baseLayers).forEach(k => map.removeLayer(baseLayers[k]));
            baseLayers[key].addTo(map);
            document.querySelectorAll('.layer-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${key}`).classList.add('active');
        }

        function toggleOverlay(key) {
            if (activeOverlays.has(key)) {
                map.removeLayer(overlays[key]);
                activeOverlays.delete(key);
                document.getElementById(`btn-${key}`).classList.remove('active');
            } else {
                overlays[key].addTo(map);
                activeOverlays.add(key);
                document.getElementById(`btn-${key}`).classList.add('active');
            }
            checkZoomLevel();
        }

        function checkZoomLevel() {
            const z = map.getZoom();
            const hint = document.getElementById('zoom-hint');
            hint.classList.toggle('hidden', !((activeOverlays.has('VILLAGE') || activeOverlays.has('LANDSECT')) && z < 14));
        }

        // --- 學校搜尋功能 ---
        async function searchSchools() {
            const level = document.getElementById('schoolLevel').value;
            const area = document.getElementById('schoolArea').value;
            if (!area) return alert("請輸入地區名稱");

            const btn = document.getElementById('btn-search-school');
            btn.innerText = "搜尋中...";
            btn.disabled = true;

            // 清除舊標記
            schoolMarkers.forEach(m => map.removeLayer(m));
            foodMarkers.forEach(m => map.removeLayer(m));
            schoolMarkers = [];
            foodMarkers = [];

            try {
                // 使用 Overpass API (OSM) 搜尋學校
                const osmLevel = level === 'university' ? 'university' : 'school';
                const query = `[out:json];node["amenity"="${osmLevel}"](around:10000,${await getAreaCoords(area)});out;`;
                // 簡化流程：先搜尋地區座標，再搜尋學校
                const areaRes = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(area)}&limit=1`);
                const areaData = await areaRes.json();
                
                if (!areaData.length) throw new Error("找不到該地區");
                const { lat, lon } = areaData[0];
                map.flyTo([lat, lon], 14);

                // 搜尋學校
                const schoolQuery = `[out:json];node["amenity"~"school|university"](around:5000,${lat},${lon});out;`;
                const res = await fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(schoolQuery)}`);
                const data = await res.json();

                const resultsContainer = document.getElementById('schoolResults');
                resultsContainer.innerHTML = '';

                if (data.elements.length === 0) {
                    resultsContainer.innerHTML = '<p class="text-xs text-center text-gray-400">該地區查無符合等級之學校</p>';
                } else {
                    data.elements.forEach(el => {
                        const sLat = el.lat;
                        const sLon = el.lon;
                        const sName = el.tags.name || "未命名學校";

                        // 建立學校標記 (紫色)
                        const sMarker = L.circleMarker([sLat, sLon], {
                            radius: 10, fillOpacity: 0.8, color: 'white', weight: 2, fillColor: '#9333ea'
                        }).addTo(map);
                        
                        sMarker.bindPopup(`
                            <div class="p-2">
                                <b class="text-purple-700">${sName}</b><br>
                                <button onclick="searchFood(${sLat}, ${sLon}, '${sName}')" class="mt-2 bg-green-500 text-white px-2 py-1 rounded text-xs">搜尋附近美食</button>
                            </div>
                        `);
                        schoolMarkers.push(sMarker);

                        // 列表項
                        const div = document.createElement('div');
                        div.className = 'p-3 bg-purple-50 rounded-lg cursor-pointer hover:bg-purple-100 transition border border-purple-100';
                        div.innerHTML = `<h4 class="text-sm font-bold text-purple-800">${sName}</h4><p class="text-[10px] text-purple-400">點擊定位並搜尋美食</p>`;
                        div.onclick = () => {
                            map.flyTo([sLat, sLon], 16);
                            sMarker.openPopup();
                        };
                        resultsContainer.appendChild(div);
                    });
                }

            } catch (err) {
                alert("搜尋失敗：" + err.message);
            } finally {
                btn.innerText = "搜尋學校";
                btn.disabled = false;
            }
        }

        async function getAreaCoords(area) {
            const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(area)}&limit=1`);
            const data = await res.json();
            return data.length ? `${data[0].lat},${data[0].lon}` : null;
        }

        // --- 美食搜尋功能 ---
        async function searchFood(lat, lon, schoolName) {
            foodMarkers.forEach(m => map.removeLayer(m));
            foodMarkers = [];

            try {
                const foodQuery = `[out:json];node["amenity"~"restaurant|cafe|fast_food"](around:1000,${lat},${lon});out;`;
                const res = await fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(foodQuery)}`);
                const data = await res.json();

                if (data.elements.length === 0) return alert("附近找不到美食餐廳。");

                data.elements.forEach(el => {
                    const fMarker = L.circleMarker([el.lat, el.lon], {
                        radius: 6, fillOpacity: 0.9, color: 'white', weight: 1, fillColor: '#22c55e'
                    }).addTo(map);
                    fMarker.bindPopup(`<b>🍴 ${el.tags.name || '美食'}</b><br><span class="text-xs">${el.tags.cuisine || '餐廳'}</span>`);
                    foodMarkers.push(fMarker);
                });

                alert(`已在 ${schoolName} 附近找到 ${data.elements.length} 家餐廳！(綠色點標註)`);
                map.setZoom(15);
            } catch (err) {
                alert("美食搜尋失敗");
            }
        }

        // --- POI 地點管理邏輯 (保持原有功能) ---
        function renderPois() {
            markers.forEach(m => map.removeLayer(m));
            markers = [];
            const list = document.getElementById('poiList');
            list.innerHTML = '';
            
            poiData.forEach((poi, i) => {
                const m = L.marker([poi.lat, poi.lng]).addTo(map);
                m.bindPopup(`<b class="text-blue-600">${poi.title}</b><p class="text-xs text-gray-500">${poi.description}</p>`);
                markers.push(m);

                const item = document.createElement('div');
                item.className = 'p-3 bg-white border rounded-xl hover:shadow-sm cursor-pointer flex justify-between items-center group';
                item.innerHTML = `<div><h4 class="text-sm font-bold">${poi.title}</h4><p class="text-xs text-gray-400">${poi.description.substring(0,10)}...</p></div>`;
                item.onclick = () => { map.flyTo([poi.lat, poi.lng], 16); m.openPopup(); };
                list.appendChild(item);
            });
            localStorage.setItem('nlsc_pois', JSON.stringify(poiData));
        }

        function addNewPoiPrompt(lat, lng) {
            const title = prompt("地點名稱:");
            if (!title) return;
            const description = prompt("簡單描述:") || "";
            poiData.push({ title, description, lat, lng });
            renderPois();
        }

        async function searchLocation() {
            const query = document.getElementById('searchInput').value;
            if (!query) return;
            const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=1`);
            const data = await res.json();
            if (data.length) {
                const { lat, lon } = data[0];
                map.flyTo([lat, lon], 16);
                if(confirm("找到地點，是否加入我的地點？")) addNewPoiPrompt(lat, lon);
            }
        }

        function exportData() {
            const blob = new Blob([JSON.stringify(poiData)], {type: "application/json"});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `my_map_${Date.now()}.json`; a.click();
        }

        function importData(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (ev) => { poiData = JSON.parse(ev.target.result); renderPois(); };
            reader.readAsText(file);
        }
    </script>
</body>
</html>
