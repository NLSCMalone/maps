<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NLSC 我的地圖 - 特教學校導航版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', 'Microsoft JhengHei', sans-serif; }
        #map { height: calc(100vh - 64px); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .layer-btn.active { background-color: #eff6ff; color: #2563eb; font-weight: 600; border: 1px solid #bfdbfe; }
        .overlay-btn.active { background-color: #fff7ed; color: #ea580c; font-weight: 600; border: 1px solid #ffedd5; }
        .overlay-btn.active .dot { background-color: #ea580c; box-shadow: 0 0 8px #ea580c; }
        .tab-btn.active { border-bottom: 2px solid #2563eb; color: #2563eb; }
        #toast-container { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); z-index: 9999; }
        .toast { background: #1f2937; color: white; padding: 12px 24px; border-radius: 12px; font-size: 14px; margin-top: 8px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); display: none; }
        .school-card:hover { border-color: #a855f7; background: #faf5ff; }
    </style>
</head>
<body class="bg-gray-50 overflow-hidden">

    <header class="h-16 bg-white border-b flex items-center justify-between px-6 shadow-sm z-50 relative">
        <div class="flex items-center space-x-3">
            <div class="bg-purple-600 p-2 rounded-lg">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path d="M12 14l9-5-9-5-9 5 9 5z" /><path d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z" />
                </svg>
            </div>
            <div>
                <h1 class="text-lg font-bold text-gray-800 leading-none">NLSC 特教地圖</h1>
                <p class="text-[10px] text-gray-400 mt-1 uppercase tracking-tighter font-bold">教育部特殊教育學校導航</p>
            </div>
        </div>
        <div class="flex items-center space-x-2">
            <button onclick="exportData()" class="px-4 py-2 text-sm font-medium text-blue-600 bg-blue-50 hover:bg-blue-100 rounded-lg transition">匯出 POI</button>
            <button onclick="document.getElementById('importFile').click()" class="px-4 py-2 text-sm font-medium text-gray-600 bg-gray-100 hover:bg-gray-200 rounded-lg transition">匯入 POI</button>
            <input type="file" id="importFile" class="hidden" onchange="importData(event)">
        </div>
    </header>

    <main class="flex relative">
        <aside id="sidebar" class="w-80 bg-white border-r h-[calc(100vh-64px)] flex flex-col z-40 shadow-lg">
            <div class="flex border-b">
                <button onclick="switchTab('manage')" id="tab-manage" class="tab-btn flex-1 py-3 text-sm font-bold text-gray-500 active">地點管理</button>
                <button onclick="switchTab('school')" id="tab-school" class="tab-btn flex-1 py-3 text-sm font-bold text-gray-500">特教探索</button>
            </div>

            <!-- 地點管理內容 -->
            <div id="content-manage" class="flex-1 overflow-y-auto p-4 space-y-4">
                <div class="relative">
                    <input type="text" id="searchInput" placeholder="搜尋地址或興趣點..." class="w-full pl-10 pr-4 py-2 border rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm">
                    <div class="absolute left-3 top-2.5 text-gray-400">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                    </div>
                </div>
                <button onclick="searchLocation()" class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition font-medium text-sm">搜尋並標記地點</button>
                <div id="poiList" class="space-y-2 pt-2"></div>
            </div>

            <!-- 特教探索內容 -->
            <div id="content-school" class="hidden flex-1 overflow-y-auto p-4 space-y-4 bg-gray-50/50">
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                    <label class="text-xs font-bold text-gray-400 uppercase block mb-2">快速搜尋區域</label>
                    <div class="flex space-x-2">
                        <input type="text" id="schoolArea" placeholder="輸入縣市, 如: 臺北市" class="flex-1 p-2.5 border border-gray-200 rounded-xl text-sm outline-none focus:ring-2 focus:ring-purple-500">
                        <button onclick="filterSchools()" class="bg-purple-600 text-white px-4 rounded-xl hover:bg-purple-700 transition">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                        </button>
                    </div>
                    <div class="flex flex-wrap gap-1 mt-3">
                        <button onclick="quickSearch('臺北')" class="text-[10px] bg-gray-100 px-2 py-1 rounded hover:bg-gray-200">臺北</button>
                        <button onclick="quickSearch('臺中')" class="text-[10px] bg-gray-100 px-2 py-1 rounded hover:bg-gray-200">臺中</button>
                        <button onclick="quickSearch('高雄')" class="text-[10px] bg-gray-100 px-2 py-1 rounded hover:bg-gray-200">高雄</button>
                        <button onclick="quickSearch('臺南')" class="text-[10px] bg-gray-100 px-2 py-1 rounded hover:bg-gray-200">臺南</button>
                        <button onclick="quickSearch('')" class="text-[10px] bg-purple-100 text-purple-600 px-2 py-1 rounded">顯示全部</button>
                    </div>
                </div>
                
                <div id="schoolResults" class="space-y-2">
                    <!-- 搜尋結果將顯示在此 -->
                </div>
            </div>
        </aside>

        <div class="flex-1 relative">
            <div id="map" class="z-0"></div>
            
            <div class="absolute top-4 right-4 z-10 flex flex-col space-y-2">
                <div class="bg-white/95 backdrop-blur-md p-2 rounded-2xl shadow-2xl border border-white/50 flex flex-col space-y-1 w-48">
                    <p class="text-[10px] font-black text-gray-400 px-2 mt-1 mb-1 uppercase tracking-widest">地圖底圖</p>
                    <button onclick="toggleBaseLayer('EMAP')" class="layer-btn active flex items-center space-x-2 px-3 py-2 rounded-xl text-sm transition-all" id="btn-EMAP">
                        <span>🗺️ 通用地圖</span>
                    </button>
                    <button onclick="toggleBaseLayer('PHOTO2')" class="layer-btn flex items-center space-x-2 px-3 py-2 rounded-xl text-sm transition-all" id="btn-PHOTO2">
                        <span>🛰️ 衛星影像</span>
                    </button>
                    <div class="h-px bg-gray-100 my-1 mx-2"></div>
                    <button onclick="toggleOverlay('LANDSECT')" class="overlay-btn flex items-center justify-between px-3 py-2 rounded-xl text-sm transition-all" id="btn-LANDSECT">
                        <span>📜 地籍段圖</span><div class="dot w-2 h-2 rounded-full bg-gray-300"></div>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <div id="toast-container"></div>

    <script>
        // 核心特教學校資料庫 (修正所有「台」為「臺」)
        const SPECIAL_SCHOOLS_DB = [
            {"name":"臺北市立啟明學校","addr":"臺北市士林區忠誠路二段207號","lat":25.1154,"lng":121.5332,"type":"啟明"},
            {"name":"臺北市立啟聰學校","addr":"臺北市大同區重慶北路三段320號","lat":25.0736,"lng":121.5146,"type":"啟聰"},
            {"name":"臺北市立臺北特殊教育學校","addr":"臺北市士林區忠誠路二段207號之1","lat":25.1155,"lng":121.5340,"type":"啟智"},
            {"name":"臺北市立文山特殊教育學校","addr":"臺北市文山區秀明路一段169號","lat":24.9928,"lng":121.5672,"type":"啟智"},
            {"name":"新北市立新北特殊教育學校","addr":"新北市林口區文化北路一段425號","lat":25.0746,"lng":121.3653,"type":"啟智"},
            {"name":"國立臺灣師範大學附屬高級中學(特教班)","addr":"臺北市大安區信義路三段143號","lat":25.0333,"lng":121.5401,"type":"綜合"},
            {"name":"國立新竹啟聰學校","addr":"新竹縣竹北市中正西路463號","lat":24.8413,"lng":120.9472,"type":"啟聰"},
            {"name":"國立臺中啟明學校","addr":"臺中市后里區三豐路三段931號","lat":24.3129,"lng":120.7302,"type":"啟明"},
            {"name":"國立臺中啟聰學校","addr":"臺中市西屯區安和路1號","lat":24.1601,"lng":120.6174,"type":"啟聰"},
            {"name":"國立臺中特殊教育學校","addr":"臺中市南屯區公益路二段296號","lat":24.1506,"lng":120.6416,"type":"啟智"},
            {"name":"國立彰化特殊教育學校","addr":"彰化縣田尾鄉饒平村公所路124號","lat":23.9015,"lng":120.5317,"type":"啟智"},
            {"name":"國立和美實驗學校","addr":"彰化縣和美鎮鹿和路六段115號","lat":24.1032,"lng":120.4851,"type":"實驗/肢障"},
            {"name":"國立嘉義特殊教育學校","addr":"嘉義市世賢路二段123號","lat":23.4727,"lng":120.4265,"type":"啟智"},
            {"name":"國立臺南啟智學校","addr":"臺南市安南區長和路二段101號","lat":23.0565,"lng":120.2291,"type":"啟智"},
            {"name":"國立臺南大學附屬啟聰學校","addr":"臺南市北區北門路二段109號","lat":23.0039,"lng":120.2132,"type":"啟聰"},
            {"name":"國立高雄啟明學校","addr":"高雄市楠梓區復興路1號","lat":22.7153,"lng":120.3155,"type":"啟明"},
            {"name":"高雄市立高雄特殊教育學校","addr":"高雄市苓雅區憲政路25號","lat":22.6366,"lng":120.3235,"type":"啟智"},
            {"name":"高雄市立成功特殊教育學校","addr":"高雄市前鎮區復興三路3號","lat":22.6074,"lng":120.3045,"type":"啟智"},
            {"name":"國立屏東特殊教育學校","addr":"屏東縣潮州鎮光復路411號","lat":22.5489,"lng":120.5365,"type":"啟智"},
            {"name":"國立宜蘭特殊教育學校","addr":"宜蘭縣五結鄉中正路二段15號","lat":24.7006,"lng":121.7698,"type":"啟智"},
            {"name":"國立花蓮特殊教育學校","addr":"花蓮縣吉安鄉中山路二段2號","lat":23.9786,"lng":121.5755,"type":"啟智"},
            {"name":"國立臺東大學附屬特殊教育學校","addr":"臺東縣臺東市中興路四段1號","lat":22.7663,"lng":121.1072,"type":"啟智"}
        ];

        let map, markers = [], schoolMarkers = [], foodMarkers = [];
        let poiData = JSON.parse(localStorage.getItem('nlsc_pois_final') || '[]');
        let baseLayers = {}, overlays = {};
        let activeOverlays = new Set();

        function showToast(msg) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.style.display = 'block';
            toast.innerText = msg;
            container.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 500); }, 3000);
        }

        window.onload = function() {
            map = L.map('map', { center: [23.97, 120.97], zoom: 8, zoomControl: false });
            L.control.zoom({ position: 'bottomright' }).addTo(map);

            const nlscUrl = 'https://wmts.nlsc.gov.tw/wmts/{id}/default/GoogleMapsCompatible/{z}/{y}/{x}';
            baseLayers.EMAP = L.tileLayer(nlscUrl.replace('{id}', 'EMAP'), { maxZoom: 20 });
            baseLayers.PHOTO2 = L.tileLayer(nlscUrl.replace('{id}', 'PHOTO2'), { maxZoom: 20 });
            overlays.LANDSECT = L.tileLayer(nlscUrl.replace('{id}', 'LANDSECT'), { maxZoom: 20, transparent: true, zIndex: 120 });

            baseLayers.EMAP.addTo(map);
            renderPois();
            filterSchools(); // 預設載入所有學校
        };

        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            document.getElementById('content-manage').classList.toggle('hidden', tab !== 'manage');
            document.getElementById('content-school').classList.toggle('hidden', tab !== 'school');
        }

        function toggleBaseLayer(key) {
            Object.keys(baseLayers).forEach(k => map.removeLayer(baseLayers[k]));
            baseLayers[key].addTo(map);
            document.querySelectorAll('.layer-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${key}`).classList.add('active');
        }

        function toggleOverlay(key) {
            if (activeOverlays.has(key)) {
                map.removeLayer(overlays[key]);
                activeOverlays.delete(key);
                document.getElementById(`btn-${key}`).classList.remove('active');
            } else {
                overlays[key].addTo(map);
                activeOverlays.add(key);
                document.getElementById(`btn-${key}`).classList.add('active');
                if (map.getZoom() < 15) showToast("請放大地圖以查看地籍細節");
            }
        }

        // --- 特教學校搜尋邏輯 ---
        function quickSearch(city) {
            document.getElementById('schoolArea').value = city;
            filterSchools();
        }

        function filterSchools() {
            const query = document.getElementById('schoolArea').value.toLowerCase().replace(/台/g, '臺');
            const resultsContainer = document.getElementById('schoolResults');
            resultsContainer.innerHTML = '';
            
            // 清除舊標記
            schoolMarkers.forEach(m => map.removeLayer(m));
            schoolMarkers = [];

            const filtered = SPECIAL_SCHOOLS_DB.filter(s => 
                s.name.includes(query) || s.addr.includes(query)
            );

            if (filtered.length === 0) {
                resultsContainer.innerHTML = '<p class="text-center text-xs text-gray-400 py-10">找不到相符學校</p>';
                return;
            }

            filtered.forEach(school => {
                // 地圖標記
                const marker = L.circleMarker([school.lat, school.lng], {
                    radius: 10, color: '#fff', weight: 2, fillColor: '#9333ea', fillOpacity: 0.8
                }).addTo(map);

                marker.bindPopup(`
                    <div class="p-1">
                        <p class="text-[10px] text-purple-600 font-bold">${school.type}學校</p>
                        <b class="text-sm">${school.name}</b>
                        <p class="text-[10px] text-gray-500 my-1">${school.addr}</p>
                        <button onclick="searchFood(${school.lat}, ${school.lng}, '${school.name}')" class="w-full bg-green-500 text-white py-1.5 rounded mt-2 text-[10px] font-bold">🍴 搜尋 1km 美食</button>
                    </div>
                `);
                schoolMarkers.push(marker);

                // 側邊欄列表
                const div = document.createElement('div');
                div.className = 'school-card p-3 bg-white border border-gray-100 rounded-xl cursor-pointer transition';
                div.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div>
                            <h4 class="text-sm font-bold text-gray-800">${school.name}</h4>
                            <p class="text-[10px] text-gray-400 mt-1">${school.addr}</p>
                        </div>
                        <span class="text-[9px] bg-purple-100 text-purple-600 px-2 py-0.5 rounded-full">${school.type}</span>
                    </div>
                `;
                div.onclick = () => {
                    map.flyTo([school.lat, school.lng], 16);
                    marker.openPopup();
                };
                resultsContainer.appendChild(div);
            });
            
            if (query !== "") {
                const first = filtered[0];
                map.flyTo([first.lat, first.lng], 12);
            }
        }

        async function searchFood(lat, lon, name) {
            foodMarkers.forEach(m => map.removeLayer(m));
            foodMarkers = [];
            showToast(`搜尋 ${name} 附近美食...`);
            try {
                const q = `[out:json];node["amenity"~"restaurant|cafe|fast_food"](around:1000,${lat},${lon});out;`;
                const res = await fetch(`https://overpass-api.de/api/interpreter`, { method: 'POST', body: `data=${encodeURIComponent(q)}` });
                const data = await res.json();
                
                data.elements.forEach(el => {
                    const fm = L.circleMarker([el.lat, el.lon], {
                        radius: 5, color: '#fff', weight: 1, fillColor: '#22c55e', fillOpacity: 0.9
                    }).addTo(map);
                    fm.bindPopup(`<b class="text-xs">🍴 ${el.tags.name || '美食'}</b>`);
                    foodMarkers.push(fm);
                });
                showToast(`已標記 ${data.elements.length} 處美食`);
            } catch (e) {
                showToast("美食搜尋失敗，請稍後再試");
            }
        }

        // --- POI 管理功能 ---
        function renderPois() {
            markers.forEach(m => map.removeLayer(m));
            markers = [];
            const list = document.getElementById('poiList');
            list.innerHTML = '';
            poiData.forEach((poi, i) => {
                const m = L.marker([poi.lat, poi.lng]).addTo(map);
                m.bindPopup(`<div class="p-1"><b>${poi.title}</b><br><button onclick="deletePoi(${i})" class="text-[10px] text-red-500 underline mt-2">刪除</button></div>`);
                markers.push(m);
                const item = document.createElement('div');
                item.className = 'p-3 bg-white border rounded-xl flex justify-between items-center text-sm';
                item.innerHTML = `<span class="font-medium truncate">${poi.title}</span><button onclick="deletePoi(${i})" class="text-red-400">❌</button>`;
                item.onclick = () => map.flyTo([poi.lat, poi.lng], 16);
                list.appendChild(item);
            });
            localStorage.setItem('nlsc_pois_final', JSON.stringify(poiData));
        }

        function deletePoi(i) { poiData.splice(i, 1); renderPois(); }

        async function searchLocation() {
            const query = document.getElementById('searchInput').value;
            if (!query) return;
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=1`);
                const data = await res.json();
                if (data.length) {
                    const { lat, lon, display_name } = data[0];
                    map.flyTo([lat, lon], 17);
                    if(confirm(`找到：${display_name}\n是否加入標記？`)) {
                        const title = prompt("標記名稱:", query);
                        if(title) { poiData.push({title, lat, lng: lon}); renderPois(); }
                    }
                } else showToast("找不到地點");
            } catch (e) { showToast("搜尋服務忙碌"); }
        }

        function exportData() {
            const blob = new Blob([JSON.stringify(poiData)], {type: "application/json"});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = "my_pois.json";
            a.click();
        }

        function importData(e) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                poiData = JSON.parse(ev.target.result);
                renderPois();
            };
            reader.readAsText(e.target.files[0]);
        }
    </script>
</body>
</html>
